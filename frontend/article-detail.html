<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar" id="navbar"></div>

    <div class="container">
        <div class="card article-detail" id="articleDetail"></div>

        <div class="card">
            <h3 style="margin-bottom:14px;">评论</h3>
            <div id="commentList" class="comment-list"></div>
            <div id="commentForm" style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border-subtle);">
                <div class="form-group">
                    <textarea id="commentContent" rows="3" placeholder="写下你的评论..."></textarea>
                    <span class="error-msg" id="commentError"></span>
                </div>
                <button class="btn btn-primary" id="submitComment">发表评论</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/article-detail.js"></script>
</body>
</html>
