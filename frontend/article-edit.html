<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">发布文章</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar" id="navbar"></div>

    <div class="container">
        <div class="card">
            <div class="form-group">
                <label>标题 <span class="required">*</span></label>
                <input type="text" id="title" placeholder="请输入文章标题" maxlength="200" />
                <span class="error-msg" id="titleError"></span>
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="categorySelect"><option value="">请选择分类</option></select>
            </div>
            <div class="form-group">
                <label>摘要</label>
                <textarea id="summary" rows="2" placeholder="文章摘要（可选，不填将自动截取正文前200字）" maxlength="500"></textarea>
            </div>
            <div class="form-group">
                <label>标签</label>
                <div class="tag-editor" id="tagEditor">
                    <input type="text" id="tagInput" placeholder="输入标签后按回车" />
                </div>
            </div>
            <div class="form-group">
                <label>正文 <span class="required">*</span> <span style="font-weight:normal;color:var(--text-muted);font-size:12px;">（支持 Markdown 语法）</span></label>
                <!-- Markdown 工具栏 -->
                <div class="md-toolbar">
                    <button type="button" title="粗体" data-md="bold"><strong>B</strong></button>
                    <button type="button" title="斜体" data-md="italic"><em>I</em></button>
                    <button type="button" title="标题" data-md="heading">H</button>
                    <button type="button" title="无序列表" data-md="ul">≡</button>
                    <button type="button" title="有序列表" data-md="ol">1.</button>
                    <button type="button" title="链接" data-md="link">🔗</button>
                    <button type="button" title="图片" data-md="image">🖼</button>
                    <button type="button" title="代码块" data-md="code">&lt;/&gt;</button>
                    <button type="button" title="引用" data-md="quote">❝</button>
                    <button type="button" title="分隔线" data-md="hr">—</button>
                    <span class="md-toolbar-right">
                        <a href="https://markdown.com.cn/basic-syntax/" target="_blank" style="font-size:12px;">语法帮助</a>
                    </span>
                </div>
                <!-- 编辑/预览 标签 -->
                <div class="md-tabs">
                    <span class="md-tab active" data-tab="edit">编辑</span>
                    <span class="md-tab" data-tab="preview">预览</span>
                </div>
                <textarea id="content" rows="14" placeholder="支持 Markdown 语法编写文章...&#10;&#10;# 一级标题&#10;## 二级标题&#10;**粗体** *斜体*&#10;- 列表项&#10;1. 有序列表&#10;> 引用&#10;`代码`&#10;```&#10;代码块&#10;```"></textarea>
                <div id="contentPreview" class="md-preview" style="display:none;"></div>
                <span class="error-msg" id="contentError"></span>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" id="publishBtn">发布</button>
                <button class="btn btn-default" id="draftBtn">保存草稿</button>
                <a href="index.html" class="btn btn-default">返回</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/article-edit.js"></script>
</body>
</html>
